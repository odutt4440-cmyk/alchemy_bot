name: Build Infinite Craft DB
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      
      - name: Run scraper
        run: python scrape_to_sqlite.py
      
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG_NAME="db-$(date +%Y%m%d-%H%M%S)"
          gh release create "$TAG_NAME" infinite_craft.db.gz \
            --title "Database $(date +%Y-%m-%d)" \
            --notes "Infinite Craft DB auto-built"
